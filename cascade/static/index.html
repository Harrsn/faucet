<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cascade</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --panel2:#1b2230; --line:#21262d; --line-hi:#30363d;
    --txt:#e6edf3; --muted:#8b949e; --accent:#2f81f7; --good:#3fb950; --warn:#d29922;
    --bad:#f85149; --purple:#a371f7; --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:14px;line-height:1.5;}
  .wrap{max-width:1140px;margin:0 auto;padding:20px 20px 130px;}
  header{display:flex;align-items:center;gap:14px;margin-bottom:6px;}
  h1{font-size:18px;margin:0;letter-spacing:.5px;} h1 .dot{color:var(--accent);}
  .sub{color:var(--muted);font-size:12px;} .spacer{flex:1;}
  .activity-btn{background:var(--panel);border:1px solid var(--line-hi);color:var(--txt);border-radius:6px;
    padding:7px 13px;cursor:pointer;font-family:var(--mono);font-size:13px;display:flex;align-items:center;gap:7px;}
  .activity-btn:hover{border-color:var(--accent);}
  .badge-count{background:var(--accent);color:#fff;border-radius:10px;padding:0 7px;font-size:11px;min-width:18px;text-align:center;}
  .badge-count.zero{display:none;}

  /* stats bar */
  .statsbar{display:flex;gap:18px;flex-wrap:wrap;padding:10px 14px;background:var(--panel);
    border:1px solid var(--line);border-radius:8px;margin:12px 0;font-size:12px;}
  .stat{display:flex;flex-direction:column;gap:1px;}
  .stat .k{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;}
  .stat .v{font-variant-numeric:tabular-nums;}
  .stat .v.warn{color:var(--warn);} .stat .v.bad{color:var(--bad);} .stat .v.good{color:var(--good);}
  .diskbar{height:4px;width:120px;background:var(--line);border-radius:2px;margin-top:3px;overflow:hidden;}
  .diskbar i{display:block;height:100%;background:var(--accent);}
  .diskbar i.warn{background:var(--warn);} .diskbar i.bad{background:var(--bad);}

  form.bar{display:flex;gap:8px;margin:14px 0 6px;flex-wrap:wrap;position:relative;}
  .searchwrap{flex:1 1 280px;min-width:0;position:relative;}
  input[type=text]{width:100%;background:var(--panel);color:var(--txt);border:1px solid var(--line-hi);
    border-radius:6px;padding:10px 12px;font-family:var(--mono);font-size:14px;}
  input[type=text]:focus{outline:2px solid var(--accent);outline-offset:-1px;}
  select,button.go{background:var(--panel);color:var(--txt);border:1px solid var(--line-hi);border-radius:6px;
    padding:10px 14px;font-family:var(--mono);font-size:14px;cursor:pointer;}
  button.go{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  button.go:hover{filter:brightness(1.08);} button:disabled{opacity:.5;cursor:default;}

  /* history dropdown */
  .history{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--panel);
    border:1px solid var(--line-hi);border-radius:6px;z-index:20;overflow:hidden;display:none;}
  .history.show{display:block;}
  .history div{padding:8px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;}
  .history div:hover,.history div.sel{background:var(--panel2);}
  .history div .ico{color:var(--muted);font-size:11px;}

  /* filter row */
  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0;font-size:12px;}
  .filters label{color:var(--muted);display:flex;align-items:center;gap:5px;}
  .filters select,.filters input{background:var(--panel);color:var(--txt);border:1px solid var(--line-hi);
    border-radius:5px;padding:5px 8px;font-family:var(--mono);font-size:12px;}
  .filters input[type=number]{width:70px;}
  .chip{padding:3px 10px;border:1px solid var(--line-hi);border-radius:14px;cursor:pointer;color:var(--muted);}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .status{color:var(--muted);font-size:12px;min-height:18px;margin:8px 2px;}

  table{width:100%;border-collapse:collapse;margin-top:4px;}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
  th{color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.6px;}
  th.sortable{cursor:pointer;user-select:none;} th.sortable:hover{color:var(--txt);}
  th .arrow{opacity:.5;font-size:9px;}
  tr.result:hover td{background:#1b2026;} tr.result.kbsel td{background:#1d2733;box-shadow:inset 2px 0 0 var(--accent);}
  td.seed{font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap;}
  td.size{text-align:right;white-space:nowrap;color:var(--muted);}
  td.trk{color:var(--muted);white-space:nowrap;}
  td.act{text-align:right;white-space:nowrap;}
  .seed-good{color:var(--good);} .seed-mid{color:var(--warn);} .seed-bad{color:var(--bad);}
  .health{display:inline-block;width:34px;height:4px;border-radius:2px;background:var(--line);vertical-align:middle;margin-left:6px;overflow:hidden;}
  .health i{display:block;height:100%;background:var(--good);}
  .tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
  .tag{font-size:10px;padding:1px 6px;border-radius:4px;border:1px solid var(--line-hi);color:var(--muted);letter-spacing:.3px;}
  .tag.res{color:var(--accent);border-color:#1f3a5f;} .tag.src{color:var(--purple);border-color:#3a2a5f;}
  .tag.ext{color:var(--good);border-color:#1f4a2f;}
  button.add{padding:5px 12px;font-size:12px;background:transparent;border:1px solid var(--accent);
    color:var(--accent);border-radius:6px;cursor:pointer;font-family:var(--mono);}
  button.add:hover{background:var(--accent);color:#fff;}
  button.add.done{border-color:var(--good);color:var(--good);}
  button.add.warn-size{border-color:var(--warn);color:var(--warn);}
  .empty{color:var(--muted);padding:30px 4px;}
  .loadmore{display:block;margin:18px auto;padding:9px 20px;background:var(--panel);border:1px solid var(--line-hi);
    color:var(--txt);border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:13px;}
  .loadmore:hover{border-color:var(--accent);}
  .kbhint{color:var(--muted);font-size:11px;margin-left:8px;}

  /* dock */
  .dock{position:fixed;bottom:16px;right:16px;width:340px;max-width:calc(100vw - 32px);background:var(--panel);
    border:1px solid var(--line-hi);border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.5);overflow:hidden;
    z-index:50;transition:transform .2s,opacity .2s;}
  .dock.hidden{transform:translateY(140%);opacity:0;pointer-events:none;}
  .dock-head{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;}
  .dock-head .t{font-size:12px;font-weight:600;} .dock-head .c{color:var(--muted);font-size:11px;}
  .dock-head .expand{margin-left:auto;color:var(--muted);font-size:11px;}
  .dock-body{max-height:300px;overflow-y:auto;} .dock.collapsed .dock-body{display:none;}
  .xfer{padding:9px 12px;border-bottom:1px solid var(--line);} .xfer:last-child{border-bottom:none;}
  .xfer .name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .xfer .meta{display:flex;gap:8px;font-size:10px;color:var(--muted);margin-top:3px;align-items:center;}
  .bar-outer{height:5px;background:var(--line);border-radius:3px;margin-top:6px;overflow:hidden;}
  .bar-inner{height:100%;background:var(--accent);border-radius:3px;transition:width .4s;}
  .bar-inner.done{background:var(--good);} .bar-inner.stopped{background:var(--muted);} .bar-inner.err{background:var(--bad);}
  .xfer .ctl,.pxfer .ctl{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
  .xfer .ctl button{font-size:10px;padding:2px 8px;background:transparent;border:1px solid var(--line-hi);
    color:var(--muted);border-radius:4px;cursor:pointer;font-family:var(--mono);}
  .xfer .ctl button:hover{border-color:var(--accent);color:var(--txt);}
  .xfer .ctl button.danger:hover{border-color:var(--bad);color:var(--bad);}
  .err-msg{color:var(--bad);font-size:10px;margin-top:4px;}

  /* panel */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .2s;z-index:60;}
  .overlay.show{opacity:1;pointer-events:auto;}
  .panel{position:fixed;top:0;right:0;height:100%;width:560px;max-width:94vw;background:var(--bg);
    border-left:1px solid var(--line-hi);transform:translateX(100%);transition:transform .25s;z-index:61;display:flex;flex-direction:column;}
  .panel.show{transform:translateX(0);}
  .panel-head{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);gap:12px;}
  .panel-head h2{font-size:15px;margin:0;}
  .panel-tabs{display:flex;gap:4px;margin-left:8px;}
  .panel-tabs button{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:12px;
    padding:5px 10px;cursor:pointer;border-radius:5px;}
  .panel-tabs button.on{background:var(--panel);color:var(--txt);}
  .panel-head .close{margin-left:auto;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
  .panel-body{overflow-y:auto;padding:8px 0;flex:1;}
  .pxfer{padding:12px 18px;border-bottom:1px solid var(--line);}
  .pxfer .name{font-size:13px;word-break:break-word;cursor:pointer;}
  .pxfer .name:hover{color:var(--accent);}
  .pxfer .meta{display:flex;gap:12px;font-size:11px;color:var(--muted);margin:5px 0;flex-wrap:wrap;align-items:center;}
  .pxfer .ctl button{font-size:11px;padding:4px 12px;background:transparent;border:1px solid var(--line-hi);
    color:var(--muted);border-radius:5px;cursor:pointer;font-family:var(--mono);}
  .pxfer .ctl button:hover{border-color:var(--accent);color:var(--txt);}
  .pxfer .ctl button.danger:hover{border-color:var(--bad);color:var(--bad);}
  .filelist{margin-top:8px;padding:8px 10px;background:var(--panel);border-radius:6px;font-size:11px;display:none;}
  .filelist.show{display:block;}
  .filerow{display:flex;gap:8px;align-items:center;padding:2px 0;color:var(--muted);}
  .filerow .fn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt);}
  .filerow.skip .fn{color:var(--muted);text-decoration:line-through;}
  .st-pill{font-size:10px;padding:1px 7px;border-radius:4px;border:1px solid var(--line-hi);}
  .st-downloading{color:var(--accent);border-color:#1f3a5f;} .st-seeding{color:var(--good);border-color:#1f4a2f;}
  .st-stopped{color:var(--muted);}
  .evrow{padding:9px 18px;border-bottom:1px solid var(--line);font-size:12px;display:flex;gap:10px;align-items:baseline;}
  .evrow .ev-time{color:var(--muted);font-size:10px;white-space:nowrap;}
  .evrow .ev-kind{font-size:10px;padding:1px 7px;border-radius:4px;border:1px solid var(--line-hi);white-space:nowrap;}
  .ev-sorted{color:var(--good);border-color:#1f4a2f;} .ev-removed{color:var(--purple);border-color:#3a2a5f;}
  .ev-completed{color:var(--accent);border-color:#1f3a5f;} .ev-sort_failed,.ev-remove_failed{color:var(--bad);border-color:#5f2020;}
  .evrow .ev-name{flex:1;word-break:break-word;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel);
    border:1px solid var(--line-hi);border-left:3px solid var(--good);padding:12px 18px;border-radius:6px;
    font-size:13px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:90vw;z-index:80;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
  .toast.err{border-left-color:var(--bad);} .toast.warn{border-left-color:var(--warn);}

  /* accent presets — swapped at runtime from /api/config */
  body[data-accent="green"]{--accent:#3fb950;}
  body[data-accent="purple"]{--accent:#a371f7;}
  body[data-accent="amber"]{--accent:#d29922;}
  body[data-accent="rose"]{--accent:#f778ba;}
  body[data-theme="light"]{--bg:#ffffff;--panel:#f4f6f8;--panel2:#eaeef2;--line:#d8dee4;
    --line-hi:#c0c8d0;--txt:#1c2128;--muted:#6a737d;}
  /* setup wizard */
  .wiz-overlay{position:fixed;inset:0;background:rgba(5,8,12,.82);backdrop-filter:blur(3px);
    z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
  .wiz-overlay.show{display:flex;}
  .wiz{width:560px;max-width:96vw;max-height:92vh;overflow:hidden;background:var(--bg);
    border:1px solid var(--line-hi);border-radius:14px;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  .wiz-head{display:flex;align-items:center;gap:14px;padding:22px 24px 16px;border-bottom:1px solid var(--line);}
  .wiz-logo{font-size:28px;}
  .wiz-title{font-size:17px;font-weight:600;} .wiz-sub{color:var(--muted);font-size:12px;margin-top:2px;}
  .wiz-body{padding:22px 24px;overflow-y:auto;}
  .wiz-body label{display:block;font-size:12px;color:var(--muted);margin:14px 0 5px;}
  .wiz-body input,.wiz-body select{width:100%;background:var(--panel);color:var(--txt);
    border:1px solid var(--line-hi);border-radius:7px;padding:10px 12px;font-family:var(--mono);font-size:13px;}
  .wiz-body input:focus,.wiz-body select:focus{outline:2px solid var(--accent);outline-offset:-1px;}
  .wiz-body .hint{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;}
  .wiz-body .hint a{color:var(--accent);}
  .wiz-intro{font-size:13px;color:var(--txt);line-height:1.6;}
  .wiz-grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px;}
  .test-row{display:flex;align-items:center;gap:10px;margin-top:16px;}
  .test-result{font-size:12px;flex:1;}
  .test-result.ok{color:var(--good);} .test-result.bad{color:var(--bad);}
  .wiz-foot{display:flex;align-items:center;padding:16px 24px;border-top:1px solid var(--line);}
  .wiz-dots{flex:1;display:flex;justify-content:center;gap:6px;}
  .wiz-dots i{width:7px;height:7px;border-radius:50%;background:var(--line-hi);}
  .wiz-dots i.on{background:var(--accent);}
  .wiz-btn{background:var(--accent);border:1px solid var(--accent);color:#fff;border-radius:7px;
    padding:9px 20px;font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;}
  .wiz-btn:hover{filter:brightness(1.08);} .wiz-btn:disabled{opacity:.5;cursor:default;}
  .wiz-btn.ghost{background:transparent;border-color:var(--line-hi);color:var(--muted);font-weight:400;}
  .wiz-btn.ghost:hover{border-color:var(--txt);color:var(--txt);filter:none;}
  .accent-swatches{display:flex;gap:8px;margin-top:6px;}
  .accent-swatches button{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
  .accent-swatches button.sel{border-color:var(--txt);}
  /* search mode toggle */
  .mode-toggle{display:flex;gap:6px;margin:10px 0 4px;}
  .mode-toggle .mode{background:var(--panel);border:1px solid var(--line-hi);color:var(--muted);
    border-radius:6px;padding:6px 14px;font-family:var(--mono);font-size:12px;cursor:pointer;}
  .mode-toggle .mode.on{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* poster grid (TMDb title search) */
  .poster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;margin-top:10px;}
  .poster{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;
    cursor:pointer;transition:border-color .15s,transform .15s;display:flex;flex-direction:column;}
  .poster:hover{border-color:var(--accent);transform:translateY(-2px);}
  .poster .img{aspect-ratio:2/3;background:var(--panel2) center/cover no-repeat;display:flex;
    align-items:center;justify-content:center;color:var(--muted);font-size:11px;}
  .poster .meta{padding:8px 10px;}
  .poster .pt{font-size:12px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .poster .py{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;margin-top:2px;}
  .poster .badge-type{font-size:9px;padding:1px 5px;border-radius:3px;border:1px solid var(--line-hi);}
  .poster .badge-type.movie{color:var(--accent);} .poster .badge-type.tv{color:var(--purple);}

  /* generic modal (settings, stats) */
  .modal-overlay{position:fixed;inset:0;background:rgba(5,8,12,.78);backdrop-filter:blur(3px);
    z-index:150;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{width:640px;max-width:96vw;max-height:90vh;background:var(--bg);border:1px solid var(--line-hi);
    border-radius:14px;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  .modal-head{display:flex;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line);}
  .modal-head h2{font-size:16px;margin:0;}
  .modal-close{margin-left:auto;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;}
  .modal-body{overflow-y:auto;padding:18px 22px;flex:1;}
  .modal-foot{padding:14px 22px;border-top:1px solid var(--line);text-align:right;}
  .set-group{margin-bottom:18px;} .set-group h3{font-size:12px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.5px;margin:0 0 8px;}
  .set-row{margin-bottom:10px;} .set-row label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
  .set-row input,.set-row select{width:100%;background:var(--panel);color:var(--txt);border:1px solid var(--line-hi);
    border-radius:6px;padding:9px 11px;font-family:var(--mono);font-size:13px;}
  .stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:14px;}
  .stat-card .num{font-size:22px;font-weight:600;} .stat-card .lbl{font-size:11px;color:var(--muted);margin-top:2px;}
  .hist-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:12px;align-items:baseline;}
  .hist-row .ht{color:var(--muted);font-size:10px;white-space:nowrap;}
  .hist-row .he{font-size:10px;padding:1px 6px;border-radius:3px;border:1px solid var(--line-hi);white-space:nowrap;}
  .hist-row .hn{flex:1;word-break:break-word;}
  .tag.ctype{font-weight:600;}
  .tag.ctype.game{background:rgba(163,113,247,.15);color:var(--purple);border-color:rgba(163,113,247,.3);}
  .tag.ctype.movie{background:rgba(47,129,247,.15);color:var(--accent);border-color:rgba(47,129,247,.3);}
  .tag.ctype.tv{background:rgba(63,185,80,.15);color:var(--good);border-color:rgba(63,185,80,.3);}
  .tag.platform{background:var(--panel2);color:var(--muted);}
  /* quality profiles */
  .prof-card{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:12px 14px;margin-bottom:10px;}
  .prof-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .prof-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center;font-size:12px;}
  .prof-meta .muted{color:var(--muted);}
  .link-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-family:var(--mono);font-size:12px;padding:0 4px;}
  .link-btn.danger{color:var(--bad);}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{background:var(--panel2);border:1px solid var(--line-hi);border-radius:14px;padding:4px 12px;
    font-size:12px;cursor:pointer;color:var(--muted);user-select:none;}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  /* toggle switch */
  .switch{position:relative;display:inline-block;width:34px;height:18px;vertical-align:middle;}
  .switch input{opacity:0;width:0;height:0;}
  .switch span{position:absolute;cursor:pointer;inset:0;background:var(--line-hi);border-radius:18px;transition:.2s;}
  .switch span:before{content:"";position:absolute;height:12px;width:12px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
  .switch input:checked+span{background:var(--accent);}
  .switch input:checked+span:before{transform:translateX(16px);}
  @media (max-width:640px){td.trk,th.trk{display:none;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>cascade<span class="dot">·</span></h1>
    <span class="sub">search &amp; manage</span>
    <span class="spacer"></span>
    <button class="activity-btn" id="subsBtn" title="Auto-grab subscriptions">📡</button>
    <button class="activity-btn" id="profilesBtn" title="Quality profiles">🎯</button>

      <button class="wiz-btn ghost" id="wizBack" style="visibility:hidden">back</button>

    </div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const esc = s => { const d=document.createElement("div"); d.textContent = s==null?"":s; return d.innerHTML; };
const GB = 1024**3;
let BIG_DOWNLOAD = 20*GB; Object.defineProperty(window,"__setBig",{value:g=>BIG_DOWNLOAD=g*GB});          // warn threshold for a single torrent
const LOW_DISK_PCT = 90;             // disk used % that flips the bar to bad
function seedClass(n){ return n>=20?"seed-good":n>=3?"seed-mid":"seed-bad"; }
function toast(m,kind){ const t=$("toast"); t.textContent=m; t.className="toast show"+(kind?" "+kind:"");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),3400); }

/* ---------------- search history (in-memory + sessionStorage-free) ---------------- */
let history = [];
try { history = JSON.parse(window.name||"[]"); if(!Array.isArray(history)) history=[]; } catch(_){ history=[]; }
function saveHistory(){ try{ window.name=JSON.stringify(history.slice(0,12)); }catch(_){} }
function addHistory(q){ q=q.trim(); if(!q) return; history=history.filter(h=>h!==q); history.unshift(q); history=history.slice(0,12); saveHistory(); }
let histSel=-1;
function renderHistory(filter){
  const box=$("history"); const items=history.filter(h=>!filter||h.toLowerCase().includes(filter.toLowerCase()));
  if(!items.length){ box.classList.remove("show"); return; }
  box.innerHTML=items.map((h,i)=>`<div data-h="${esc(h)}" class="${i===histSel?'sel':''}"><span class="ico">↻</span>${esc(h)}</div>`).join("");
  box.classList.add("show");
  box.querySelectorAll("div[data-h]").forEach(d=>d.addEventListener("mousedown",e=>{e.preventDefault(); $("q").value=d.dataset.h; hideHistory(); doSearch();}));
}
function hideHistory(){ $("history").classList.remove("show"); histSel=-1; }
$("q").addEventListener("focus",()=>{ if(!$("q").value) renderHistory(""); });
$("q").addEventListener("input",()=>{ histSel=-1; renderHistory($("q").value); });
$("q").addEventListener("blur",()=>setTimeout(hideHistory,150));

/* ---------------- search + client-side sort/filter/paginate ---------------- */
let allResults=[];          // full set from server
let sortKey="seeders", sortDir=-1;
let shown=0; const PAGE=25;
let kbSel=-1;               // keyboard-selected visible row index

$("searchForm").addEventListener("submit",e=>{e.preventDefault(); doSearch();});

async function doSearch(){
  const q=$("q").value.trim(); if(!q) return;
  addHistory(q); hideHistory();
  $("goBtn").disabled=true; $("status").textContent="searching…";
  $("resultsTable").hidden=true; $("empty").hidden=true; $("loadMore").hidden=true; $("rows").innerHTML="";
  $("filters").hidden=true; kbSel=-1;
  try{
    const r=await fetch(`/api/search?q=${encodeURIComponent(q)}&cat=${$("cat").value}&limit=150`);
    if(!r.ok) throw new Error((await r.json()).detail||r.statusText);
    const d=await r.json(); allResults=d.results||[];
    if(!allResults.length){ $("status").textContent=""; $("empty").hidden=false; $("empty").textContent="No results. Try fewer words or a different category."; return; }
    $("filters").hidden=false;
    applyView(true);
  }catch(err){ $("status").textContent=""; $("empty").hidden=false; $("empty").textContent=`Search failed: ${err.message}`; }
  finally{ $("goBtn").disabled=false; }
}

function currentView(){
  const minSeed=parseInt($("fSeed").value)||0, res=$("fRes").value, src=$("fSrc").value;
  let v=allResults.filter(r=>r.seeders>=minSeed
    && (!res || (r.badges&&r.badges.res===res))
    && (!src || (r.badges&&r.badges.source===src)));
  v.sort((a,b)=>{ const av=a[sortKey]??0, bv=b[sortKey]??0; return (av<bv?-1:av>bv?1:0)*sortDir; });
  return v;
}

function applyView(reset){
  if(reset) shown=0;
  const v=currentView();
  shown=Math.min(Math.max(shown,PAGE), v.length);
  renderRows(v.slice(0,shown));
  $("resultsTable").hidden = v.length===0;
  $("empty").hidden = v.length>0;
  if(v.length===0){ $("empty").textContent="No results match the current filters."; }
  $("loadMore").hidden = shown>=v.length;
  $("status").textContent=`${v.length} of ${allResults.length} results · showing ${Math.min(shown,v.length)}`;
  // sort arrows
  ["seeders","size"].forEach(k=>{ const el=$("ar-"+k); if(!el) return;
    el.textContent = sortKey===k ? (sortDir<0?"▼":"▲") : ""; });
  kbSel=-1; updateKbSel();
}

function typeBadge(r){
  if(!r||!r.ctype) return "";
  const icons={game:"🎮",movie:"🎬",tv:"📺",audio:"🎵",book:"📚",other:"📦"};
  let h=`<span class="tag ctype ${esc(r.ctype)}">${icons[r.ctype]||""} ${esc(r.ctype)}</span>`;
  if(r.platform) h+=`<span class="tag platform">${esc(r.platform)}</span>`;
  return h;
}
function badgeHtml(b){ if(!b) return ""; let h="";
  if(b.res) h+=`<span class="tag res">${esc(b.res)}</span>`;
  if(b.source) h+=`<span class="tag src">${esc(b.source)}</span>`;
  if(b.ext) h+=`<span class="tag ext">${esc(b.ext)}</span>`;
  return h?`<div class="tags">${h}</div>`:""; }

function healthHtml(r){
  const total=r.seeders+(r.peers||0); const pct= total? Math.round(r.seeders/total*100):0;
  return `<span class="health" title="${r.seeders} seed / ${r.peers||0} peers"><i style="width:${pct}%"></i></span>`;
}

function renderRows(list){
  $("rows").innerHTML="";
  list.forEach((r,idx)=>{
    const big = r.size>=BIG_DOWNLOAD;
    const tr=document.createElement("tr"); tr.className="result"; tr.dataset.idx=idx;
    tr.innerHTML=`
      <td class="seed ${seedClass(r.seeders)}">${r.seeders}${healthHtml(r)}</td>
      <td class="size">${esc(r.size_h)}</td>
      <td class="trk">${esc(r.tracker||"")}</td>
      <td class="title">${esc(r.title)}${typeBadge(r)}${badgeHtml(r.badges)}</td>
      <td class="act"><button class="add ${big?'warn-size':''}" title="${big?'Large file — confirm':''}">add</button></td>`;
    tr.querySelector(".add").addEventListener("click",e=>addTorrent(r,e.target));
    $("rows").appendChild(tr);
  });
}

$("loadMore").addEventListener("click",()=>{ shown+=PAGE; applyView(false); });
document.querySelectorAll("th.sortable").forEach(th=>th.addEventListener("click",()=>{
  const k=th.dataset.sort; if(sortKey===k) sortDir*=-1; else { sortKey=k; sortDir=-1; } applyView(true);
}));
["fSeed","fRes","fSrc"].forEach(id=>$(id).addEventListener("input",()=>applyView(true)));

async function addTorrent(r,btn){
  if(r.size>=BIG_DOWNLOAD && !confirm(`This is ${r.size_h}. Add anyway?`)) return;
  // disk guard: if we know free space and it's smaller than the file, warn hard
  if(lastStats.disk && r.size > lastStats.disk.free){
    if(!confirm(`Only ${lastStats.disk.free_h} free on disk but this is ${r.size_h}. Add anyway?`)) return;
  }
  btn.disabled=true; btn.textContent="…";
  try{
    const resp=await fetch("/api/add",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({magnet:r.href,title:r.title})});
    if(!resp.ok) throw new Error((await resp.json()).detail||resp.statusText);
    const d=await resp.json();
    btn.textContent=d.duplicate?"queued":"added"; btn.classList.add("done");
    toast(d.duplicate?`Already in queue: ${d.name}`:`Added: ${d.name}`);
    showDock(); pollAll();
  }catch(err){ btn.disabled=false; btn.textContent="add"; toast(`Add failed: ${err.message}`,"err"); }
}

/* ---------------- keyboard navigation ---------------- */
function visibleRows(){ return Array.from($("rows").querySelectorAll("tr.result")); }
function updateKbSel(){ visibleRows().forEach((tr,i)=>tr.classList.toggle("kbsel",i===kbSel)); }
document.addEventListener("keydown",e=>{
  const histOpen=$("history").classList.contains("show");
  if(histOpen && (e.key==="ArrowDown"||e.key==="ArrowUp"||e.key==="Enter")){
    const items=$("history").querySelectorAll("div[data-h]"); if(!items.length) return;
    if(e.key==="ArrowDown"){ histSel=Math.min(histSel+1,items.length-1); e.preventDefault(); }
    else if(e.key==="ArrowUp"){ histSel=Math.max(histSel-1,0); e.preventDefault(); }
    else if(e.key==="Enter" && histSel>=0){ $("q").value=items[histSel].dataset.h; hideHistory(); doSearch(); e.preventDefault(); return; }
    items.forEach((it,i)=>it.classList.toggle("sel",i===histSel)); return;
  }
  if($("panel").classList.contains("show") && e.key==="Escape"){ closePanel(); return; }
  if(document.activeElement===$("q") && e.key!=="ArrowDown" && e.key!=="ArrowUp" && e.key!=="Enter") return;
  const rows=visibleRows(); if(!rows.length) return;
  if(e.key==="ArrowDown"){ kbSel=Math.min(kbSel+1,rows.length-1); updateKbSel(); rows[kbSel].scrollIntoView({block:"nearest"}); e.preventDefault(); }
  else if(e.key==="ArrowUp"){ kbSel=Math.max(kbSel-1,0); updateKbSel(); rows[kbSel].scrollIntoView({block:"nearest"}); e.preventDefault(); }
  else if(e.key==="Enter" && kbSel>=0){ rows[kbSel].querySelector(".add").click(); e.preventDefault(); }
  else if(e.key==="Escape"){ $("fSeed").value=0; $("fRes").value=""; $("fSrc").value=""; applyView(true); }
});

/* ---------------- transfers / stats / events ---------------- */
let lastTransfers=[], lastStats={}, panelTab="xfers", expandedFiles={};
function showDock(){ $("dock").classList.remove("hidden"); }

async function pollAll(){ await Promise.all([pollTransfers(), pollStats()]); if($("panel").classList.contains("show")) refreshPanel(); }

async function pollStats(){
  try{ const r=await fetch("/api/stats"); if(!r.ok) return; lastStats=await r.json();
    const dk=lastStats.disk;
    if(dk){ $("stDisk").textContent=dk.free_h+" / "+dk.total_h;
      const bar=$("stDiskBar"); bar.style.width=dk.pct_used+"%";
      bar.className = dk.pct_used>=LOW_DISK_PCT?"bad":dk.pct_used>=80?"warn":"";
      $("stDisk").className="v"+(dk.pct_used>=LOW_DISK_PCT?" bad":dk.pct_used>=80?" warn":""); }
    $("stDown").textContent=lastStats.down_total_h; $("stUp").textContent=lastStats.up_total_h;
    $("stDl").textContent=lastStats.downloading; $("stSeed").textContent=lastStats.seeding;
  }catch(_){}
}

async function pollTransfers(){
  try{ const r=await fetch("/api/transfers"); if(!r.ok) return; const d=await r.json(); lastTransfers=d.transfers||[];
    renderDock(lastTransfers);
    const active=lastTransfers.filter(t=>!t.done).length;
    $("activeCount").textContent=active; $("activeCount").classList.toggle("zero",active===0);
    $("dockCount").textContent=`${active} active · ${lastTransfers.length} total`;
    if(lastTransfers.length) showDock();
  }catch(_){}
}

function barClass(t){ if(t.error) return "err"; if(t.done) return "done"; if(t.status==="stopped") return "stopped"; return ""; }
function ctlButtons(t){ const tg=t.status==="stopped"
  ? `<button data-id="${t.id}" data-a="resume">resume</button>` : `<button data-id="${t.id}" data-a="pause">pause</button>`;
  return tg+`<button class="danger" data-id="${t.id}" data-a="remove">remove</button>`; }

function renderDock(xs){
  const body=$("dockBody"); const active=xs.filter(t=>!t.done);
  if(!active.length){ body.innerHTML=`<div class="xfer"><div class="meta">No active downloads</div></div>`; return; }
  body.innerHTML=active.map(t=>`
    <div class="xfer">
      <div class="name" title="${esc(t.name)}">${esc(t.name)}</div>
      <div class="bar-outer"><div class="bar-inner ${barClass(t)}" style="width:${t.percent}%"></div></div>
      <div class="meta"><span>${t.percent}%</span><span>${esc(t.down_h)}</span><span>${esc(t.status)}</span><span>eta ${esc(t.eta_h)}</span></div>
      ${t.error?`<div class="err-msg">${esc(t.error)}</div>`:""}
      <div class="ctl">${ctlButtons(t)}</div>
    </div>`).join("");
  wireControls(body);
}

/* panel: tabs (transfers | events) */
function refreshPanel(){ panelTab==="events" ? renderEvents() : renderPanelXfers(); }
async function renderEvents(){
  const body=$("panelBody"); 
  try{ const r=await fetch("/api/events?limit=60"); const d=await r.json(); const evs=d.events||[];
    if(!evs.length){ body.innerHTML=`<div class="pxfer"><div class="meta">No events yet. They appear here when downloads finish and get sorted.</div></div>`; return; }
    body.innerHTML=evs.map(e=>{
      const time=(e.ts||"").replace("T"," ").slice(5,16);
      return `<div class="evrow"><span class="ev-time">${esc(time)}</span><span class="ev-kind ev-${esc(e.event)}">${esc(e.event)}</span><span class="ev-name">${esc(e.name||e.msg||"")}</span></div>`;
    }).join("");
  }catch(_){ body.innerHTML=`<div class="pxfer"><div class="meta">Couldn't load events.</div></div>`; }
}

function renderPanelXfers(){
  const body=$("panelBody"); const xs=lastTransfers;
  if(!xs.length){ body.innerHTML=`<div class="pxfer"><div class="meta">No transfers yet. Add something from search.</div></div>`; return; }
  body.innerHTML=xs.map(t=>`
    <div class="pxfer" data-id="${t.id}">
      <div class="name" data-files="${t.id}" title="click for files">${esc(t.name)}</div>
      <div class="meta">
        <span class="st-pill st-${t.status}">${esc(t.status)}</span>
        <span>${t.percent}%</span><span>${esc(t.size_h)}</span>
        <span>↓ ${esc(t.down_h)}</span><span>eta ${esc(t.eta_h)}</span><span>ratio ${t.ratio}</span>
      </div>
      <div class="bar-outer"><div class="bar-inner ${barClass(t)}" style="width:${t.percent}%"></div></div>
      ${t.error?`<div class="err-msg">${esc(t.error)}</div>`:""}
      <div class="ctl">${ctlButtons(t)}<button class="danger" data-id="${t.id}" data-a="remove-data">remove + data</button></div>
      <div class="filelist ${expandedFiles[t.id]?'show':''}" id="files-${t.id}"></div>
    </div>`).join("");
  wireControls(body);
  body.querySelectorAll(".name[data-files]").forEach(n=>n.addEventListener("click",()=>toggleFiles(n.dataset.files)));
  // re-load any expanded file lists
  Object.keys(expandedFiles).forEach(id=>{ if(expandedFiles[id]) loadFiles(id); });
}

async function toggleFiles(id){
  expandedFiles[id]=!expandedFiles[id];
  const el=$("files-"+id); if(!el) return;
  el.classList.toggle("show",expandedFiles[id]);
  if(expandedFiles[id]) loadFiles(id);
}
async function loadFiles(id){
  const el=$("files-"+id); if(!el) return;
  try{ const r=await fetch(`/api/torrent/${id}/files`); if(!r.ok){ el.innerHTML="<div class='filerow'>couldn't load files</div>"; return; }
    const d=await r.json();
    el.innerHTML=d.files.map(f=>`<div class="filerow ${f.wanted?'':'skip'}"><span class="fn" title="${esc(f.path)}">${esc(f.name)}</span><span>${f.percent}%</span><span>${esc(f.size_h)}</span></div>`).join("");
  }catch(_){ el.innerHTML="<div class='filerow'>error</div>"; }
}

function wireControls(scope){
  scope.querySelectorAll("button[data-a]").forEach(b=>b.addEventListener("click",async()=>{
    const id=b.dataset.id, action=b.dataset.a;
    if(action.startsWith("remove") && !confirm(action==="remove-data"?"Remove torrent AND delete files?":"Remove torrent from the list?")) return;
    b.disabled=true;
    try{ const r=await fetch(`/api/torrent/${id}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action})});
      if(!r.ok) throw new Error((await r.json()).detail||r.statusText);
      toast(`${action} ok`); pollAll();
    }catch(err){ b.disabled=false; toast(`${action} failed: ${err.message}`,"err"); }
  }));
}

/* panel open/close + tabs + dock collapse */
$("dockHead").addEventListener("click",e=>{ if(e.target.id==="dockExpand"){ openPanel(); return; } $("dock").classList.toggle("collapsed"); });
function openPanel(){ $("overlay").classList.add("show"); $("panel").classList.add("show"); refreshPanel(); }
function closePanel(){ $("overlay").classList.remove("show"); $("panel").classList.remove("show"); }
$("activityBtn").addEventListener("click",openPanel);
$("panelClose").addEventListener("click",closePanel);
$("overlay").addEventListener("click",closePanel);
$("tabXfers").addEventListener("click",()=>{ panelTab="xfers"; $("tabXfers").classList.add("on"); $("tabEvents").classList.remove("on"); refreshPanel(); });
$("tabEvents").addEventListener("click",()=>{ panelTab="events"; $("tabEvents").classList.add("on"); $("tabXfers").classList.remove("on"); refreshPanel(); });


/* ---------------- app config / theming ---------------- */
async function loadConfig(){
  try{ const r=await fetch("/api/config"); if(!r.ok) return; const cfg=await r.json();
    if(cfg.title){ document.title=cfg.title; const h=document.querySelector("h1");
      if(h) h.innerHTML=esc(cfg.title.replace(/.$/,m=>m))+'<span class="dot">·</span>'; }

const wizState = {
  step: 0,
  data: { jackett_url:"http://localhost:9117", jackett_api_key:"", jackett_indexer:"all",
    client_kind:"transmission", client_url:"http://localhost:9091/transmission/rpc",
    client_user:"", client_pass:"", library_root:"/library", download_dir:"/downloads",
    notify_urls:"", ui_accent:"blue", app_title:"Cascade" },
  tested: { indexer:false, client:false },
};
const CLIENT_DEFAULTS = {
  transmission:"http://localhost:9091/transmission/rpc",
  qbittorrent:"http://localhost:8080",
  deluge:"http://localhost:8112",
};
const ACCENTS = ["blue","green","purple","amber","rose"];
const ACCENT_HEX = {blue:"#2f81f7",green:"#3fb950",purple:"#a371f7",amber:"#d29922",rose:"#f778ba"};

function wizSteps(){ return [
  { title:"Indexer", render:()=>`
    <div class="wiz-intro">Cascade searches through <b>Jackett</b> (or Prowlarr). Add a few indexers in its dashboard, then paste the API key here.</div>
    <label>Jackett URL</label>
    <input id="w_jurl" value="${esc(wizState.data.jackett_url)}" placeholder="http://localhost:9117">
    <label>API key</label>
    <input id="w_jkey" value="${esc(wizState.data.jackett_api_key)}" placeholder="from Jackett dashboard, top-right">
    <div class="hint">Open Jackett at its URL → add indexers → copy the <b>API Key</b> shown top-right.</div>
    <div class="test-row">
      <button class="wiz-btn ghost" id="w_testIdx">test connection</button>
      <span class="test-result" id="w_idxResult"></span>
    </div>` },
  { title:"Download client", render:()=>`
    <div class="wiz-intro">Which torrent client should Cascade drive? It works with all three — pick what you run.</div>
    <label>Client</label>
    <select id="w_ckind">
      ${["transmission","qbittorrent","deluge"].map(k=>`<option value="${k}" ${wizState.data.client_kind===k?"selected":""}>${k}</option>`).join("")}
    </select>
    <label>Client URL</label>
    <input id="w_curl" value="${esc(wizState.data.client_url)}">
    <div class="wiz-grid2">
      <div><label>Username</label><input id="w_cuser" value="${esc(wizState.data.client_user)}" placeholder="${wizState.data.client_kind==='deluge'?'(not used)':''}"></div>
      <div><label>Password</label><input id="w_cpass" type="password" value="${esc(wizState.data.client_pass)}"></div>
    </div>
    <div class="test-row">
      <button class="wiz-btn ghost" id="w_testCli">test connection</button>
      <span class="test-result" id="w_cliResult"></span>
    </div>` },
  { title:"Library & finish", render:()=>`
    <div class="wiz-intro">Where should finished media land, and how should it look?</div>
    <label>Library root <span class="hint" style="display:inline">(movies/ &amp; tvshows/ go here)</span></label>
    <input id="w_lib" value="${esc(wizState.data.library_root)}">
    <label>App name</label>
    <input id="w_title" value="${esc(wizState.data.app_title)}">
    <label>Accent color</label>
    <div class="accent-swatches" id="w_accents">
      ${ACCENTS.map(a=>`<button data-a="${a}" class="${wizState.data.ui_accent===a?'sel':''}" style="background:${ACCENT_HEX[a]}"></button>`).join("")}
    </div>
    <label>Notifications <span class="hint" style="display:inline">(optional)</span></label>
    <input id="w_notify" value="${esc(wizState.data.notify_urls)}" placeholder="discord://… , ntfy://ntfy.sh/topic">
    <div class="hint">Comma-separated. Supports Discord, Telegram, ntfy, Gotify, or any webhook. Leave blank to skip.</div>` },
]; }

function openWizard(){ wizState.step=0; renderWiz(); $("wizOverlay").classList.add("show"); }
function closeWizard(){ $("wizOverlay").classList.remove("show"); }

function renderWiz(){
  const steps=wizSteps(), s=steps[wizState.step];
  $("wizStep").textContent=`Step ${wizState.step+1} of ${steps.length} · ${s.title}`;
  $("wizBody").innerHTML=s.render();
  $("wizDots").innerHTML=steps.map((_,i)=>`<i class="${i===wizState.step?'on':''}"></i>`).join("");
  $("wizBack").style.visibility = wizState.step===0?"hidden":"visible";
  $("wizNext").textContent = wizState.step===steps.length-1?"finish":"next";
  wireWizStep();
}

function wireWizStep(){
  if(wizState.step===0){
    $("w_testIdx").addEventListener("click",async()=>{
      wizState.data.jackett_url=$("w_jurl").value.trim();
      wizState.data.jackett_api_key=$("w_jkey").value.trim();
      const res=$("w_idxResult"); res.textContent="testing…"; res.className="test-result";
      const r=await wizTest(); const i=r.indexer||{};
      res.textContent=i.msg||"?"; res.className="test-result "+(i.ok?"ok":"bad"); wizState.tested.indexer=!!i.ok;
    });
  }
  if(wizState.step===1){
    $("w_ckind").addEventListener("change",e=>{ wizState.data.client_kind=e.target.value;
      $("w_curl").value=CLIENT_DEFAULTS[e.target.value]||""; });
    $("w_testCli").addEventListener("click",async()=>{
      wizState.data.client_kind=$("w_ckind").value;
      wizState.data.client_url=$("w_curl").value.trim();
      wizState.data.client_user=$("w_cuser").value;
      wizState.data.client_pass=$("w_cpass").value;
      const res=$("w_cliResult"); res.textContent="testing…"; res.className="test-result";
      const r=await wizTest(); const c=r.client||{};
      res.textContent=c.msg||"?"; res.className="test-result "+(c.ok?"ok":"bad"); wizState.tested.client=!!c.ok;
    });
  }
  if(wizState.step===2){
    $("w_accents").querySelectorAll("button[data-a]").forEach(b=>b.addEventListener("click",()=>{
      wizState.data.ui_accent=b.dataset.a;
      $("w_accents").querySelectorAll("button").forEach(x=>x.classList.remove("sel"));
      b.classList.add("sel"); document.body.dataset.accent=b.dataset.a;
    }));
  }
}

async function wizTest(){
  try{ const r=await fetch("/api/setup/test",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({jackett_url:wizState.data.jackett_url,jackett_api_key:wizState.data.jackett_api_key,
      jackett_indexer:wizState.data.jackett_indexer,client_kind:wizState.data.client_kind,
      client_url:wizState.data.client_url,client_user:wizState.data.client_user,client_pass:wizState.data.client_pass})});
    return await r.json();
  }catch(_){ return {}; }
}

function captureWizStep(){
  if(wizState.step===0){ wizState.data.jackett_url=$("w_jurl").value.trim(); wizState.data.jackett_api_key=$("w_jkey").value.trim(); }
  if(wizState.step===1){ wizState.data.client_kind=$("w_ckind").value; wizState.data.client_url=$("w_curl").value.trim();
    wizState.data.client_user=$("w_cuser").value; wizState.data.client_pass=$("w_cpass").value; }
  if(wizState.step===2){ wizState.data.library_root=$("w_lib").value.trim(); wizState.data.app_title=$("w_title").value.trim();
    wizState.data.notify_urls=$("w_notify").value.trim(); }
}

$("wizBack").addEventListener("click",()=>{ captureWizStep(); if(wizState.step>0){ wizState.step--; renderWiz(); } });
$("wizNext").addEventListener("click",async()=>{
  captureWizStep();
  const steps=wizSteps();
  if(wizState.step<steps.length-1){ wizState.step++; renderWiz(); return; }
  // finish: save
  $("wizNext").disabled=true; $("wizNext").textContent="saving…";
  try{
    const r=await fetch("/api/setup/save",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify(wizState.data)});
    if(!r.ok) throw new Error((await r.json()).detail||r.statusText);
    closeWizard(); toast("Setup complete — Cascade is configured.");
    await loadConfig(); pollAll();
  }catch(err){ $("wizNext").disabled=false; $("wizNext").textContent="finish"; toast("Save failed: "+err.message,"err"); }
});

/* ---------------- search mode: title (TMDb) vs release ---------------- */
let searchMode = "release";
let metaEnabled = false;

function setMode(m){
  searchMode=m;
  document.querySelectorAll("#modeToggle .mode").forEach(b=>b.classList.toggle("on",b.dataset.mode===m));
  $("posterGrid").hidden=true; $("posterGrid").innerHTML="";
  $("resultsTable").hidden=true; $("rows").innerHTML="";
  $("filters").hidden=true; $("loadMore").hidden=true; $("empty").hidden=true;
  $("q").placeholder = m==="title" ? "search by title… e.g. dune" : "search by release… e.g. dune 2024 1080p";
}
document.querySelectorAll("#modeToggle .mode").forEach(b=>b.addEventListener("click",()=>setMode(b.dataset.mode)));

const doReleaseSearch = doSearch;
doSearch = async function(){
  if(searchMode==="title" && metaEnabled){ return doTitleSearch(); }
  return doReleaseSearch();
};

async function doTitleSearch(){
  const q=$("q").value.trim(); if(!q) return;
  addHistory(q); hideHistory();
  $("goBtn").disabled=true; $("status").textContent="searching titles…";
  $("posterGrid").hidden=true; $("posterGrid").innerHTML=""; $("resultsTable").hidden=true; $("empty").hidden=true;
  try{
    const r=await fetch(`/api/meta/search?q=${encodeURIComponent(q)}`);
    const d=await r.json();
    if(!d.results||!d.results.length){ $("status").textContent=""; $("empty").hidden=false; $("empty").textContent="No titles found."; return; }
    renderPosters(d.results);
    $("status").textContent=`${d.results.length} titles · pick one to find releases`;
  }catch(err){ $("status").textContent=""; $("empty").hidden=false; $("empty").textContent="Title search failed: "+err.message; }
  finally{ $("goBtn").disabled=false; }
}

function renderPosters(results){
  const g=$("posterGrid"); g.hidden=false;
  g.innerHTML=results.map(r=>`
    <div class="poster" data-q="${esc(r.search_query)}">
      <div class="img" style="${r.poster?`background-image:url('${esc(r.poster)}')`:''}">${r.poster?'':'no image'}</div>
      <div class="meta">
        <div class="pt" title="${esc(r.title)}">${esc(r.title)}</div>
        <div class="py"><span>${esc(r.year||'')}</span><span class="badge-type ${r.media_type}">${r.media_type}</span></div>
      </div>
    </div>`).join("");
  g.querySelectorAll(".poster").forEach(p=>p.addEventListener("click",()=>{
    $("q").value=p.dataset.q; setMode("release"); doReleaseSearch();
  }));
}

let subs=[], subsProfiles=[];
async function openSubs(){
  $("subsOverlay").classList.add("show");
  $("subsBody").innerHTML="<div style='color:var(--muted)'>loading…</div>";
  try{
    [subs,subsProfiles]=await Promise.all([
      fetch("/api/subscriptions").then(r=>r.json()).then(d=>d.subscriptions||[]),
      fetch("/api/profiles").then(r=>r.json()).then(d=>d.profiles||[]),
    ]);
    renderSubs();
    const st=await (await fetch("/api/subscriptions/status")).json();
    const mins=Math.round((st.interval_seconds||0)/60);
    const last=st.last_run&&st.last_run.ts?`last check ${st.last_run.ts.replace('T',' ').slice(5,16)} (${st.last_run.grabbed} grabbed)`:"no checks yet";
    $("subsStatus").textContent=`auto-checks every ${mins} min · ${last}`;
  }catch(_){ $("subsBody").innerHTML="<div style='color:var(--bad)'>Couldn't load subscriptions.</div>"; }
}
function renderSubs(){
  if(!subs.length){ $("subsBody").innerHTML="<div style='color:var(--muted);padding:10px 0'>No subscriptions. Follow a show or search to auto-grab new releases.</div>"; return; }
  $("subsBody").innerHTML=subs.map(s=>{
    const prof=subsProfiles.find(p=>p.id===s.profile_id);
    return `<div class="prof-card">
      <div class="prof-head"><b>${esc(s.title)}</b>
        <span class="prof-actions">
          <label class="switch" title="enabled"><input type="checkbox" data-toggle="${s.id}" ${s.enabled?'checked':''}><span></span></label>
          <button class="link-btn" data-sedit="${s.id}">edit</button>
          <button class="link-btn danger" data-sdel="${s.id}">delete</button></span></div>
      <div class="prof-meta">
        <span class="muted">query:</span> <code>${esc(s.query)}</code>
        <span class="muted">· ${prof?esc(prof.name):'best-seeded'}</span>
        ${s.last_grab?`<span class="muted">· last grab ${esc((s.last_grab||'').replace('T',' ').slice(5,16))}</span>`:''}
      </div></div>`;
  }).join("");
  $("subsBody").querySelectorAll("[data-sedit]").forEach(b=>b.addEventListener("click",()=>subForm(subs.find(s=>s.id===+b.dataset.sedit))));
  $("subsBody").querySelectorAll("[data-sdel]").forEach(b=>b.addEventListener("click",()=>delSub(+b.dataset.sdel)));
  $("subsBody").querySelectorAll("[data-toggle]").forEach(b=>b.addEventListener("change",()=>toggleSub(+b.dataset.toggle,b.checked)));
}
function subForm(s){
  s=s||{title:"",query:"",media_type:"tv",profile_id:null,enabled:true};
  const opts=`<option value="">best-seeded (no profile)</option>`+subsProfiles.map(p=>`<option value="${p.id}" ${s.profile_id===p.id?'selected':''}>${esc(p.name)}</option>`).join("");
  $("subsBody").innerHTML=`
    <div class="set-row"><label>Name</label><input id="sf_title" value="${esc(s.title)}" placeholder="e.g. The Office"></div>
    <div class="set-row"><label>Search query (what to look for each check)</label><input id="sf_query" value="${esc(s.query)}" placeholder="e.g. the office s03"></div>
    <div class="set-row"><label>Quality profile</label><select id="sf_profile">${opts}</select></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="wiz-btn" id="sf_save">${s.id?'save':'create'}</button>
      <button class="wiz-btn ghost" id="sf_cancel">cancel</button></div>
    <div class="hint" style="margin-top:10px">Cascade searches this query on a timer and grabs the best new release matching your profile. Already-grabbed releases are skipped automatically.</div>`;
  $("sf_cancel").addEventListener("click",renderSubs);
  $("sf_save").addEventListener("click",async()=>{
    const body={title:$("sf_title").value.trim(),query:$("sf_query").value.trim(),
      media_type:"tv",profile_id:$("sf_profile").value?+$("sf_profile").value:null,enabled:true};
    if(!body.title){ toast("Name required","err"); return; }
    if(!body.query) body.query=body.title;
    const url=s.id?`/api/subscriptions/${s.id}`:"/api/subscriptions";
    try{ await fetch(url,{method:s.id?"PUT":"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      toast("Subscription saved."); await openSubs();
    }catch(_){ toast("Save failed","err"); }
  });
}
async function delSub(id){ try{ await fetch(`/api/subscriptions/${id}`,{method:"DELETE"}); toast("Deleted."); await openSubs(); }catch(_){ toast("Delete failed","err"); } }
async function toggleSub(id,on){
  const s=subs.find(x=>x.id===id); if(!s) return;
  try{ await fetch(`/api/subscriptions/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({title:s.title,query:s.query,media_type:s.media_type,profile_id:s.profile_id,enabled:on})}); }
  catch(_){ toast("Toggle failed","err"); }
}
$("subsBtn").addEventListener("click",openSubs);
$("subsClose").addEventListener("click",()=>$("subsOverlay").classList.remove("show"));
$("subsOverlay").addEventListener("click",e=>{ if(e.target.id==="subsOverlay") $("subsOverlay").classList.remove("show"); });
$("subsNew").addEventListener("click",()=>subForm(null));
$("subsCheck").addEventListener("click",async()=>{
  $("subsCheck").disabled=true; $("subsCheck").textContent="checking…";
  try{ const r=await (await fetch("/api/subscriptions/check",{method:"POST"})).json();
    toast(`Checked ${r.checked} · grabbed ${r.grabbed}.`); await openSubs();
  }catch(_){ toast("Check failed","err"); }
  finally{ $("subsCheck").disabled=false; $("subsCheck").textContent="check now"; }
});

async function refreshMeta(){
  try{ const r=await fetch("/api/meta/search?q=test"); const d=await r.json(); metaEnabled=!!d.enabled; }
  catch(_){ metaEnabled=false; }
  $("modeToggle").hidden=!metaEnabled;
  if(metaEnabled && searchMode==="release"){ setMode("title"); }
}
refreshMeta();

loadConfig();

pollAll();
setInterval(pollAll, 2000);
</script>
</body>
</html>
